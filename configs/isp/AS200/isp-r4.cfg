!
! =============================================
! Device: ISP-R4
! Role: AS200 Route Reflector
! Site: ISP-2
! Platform: Cisco IOSv 15.6
!
! Topology:
!   G0/0 -> ISP-R3
!   G0/1 -> ISP-R5
!   G0/2 -> ISP-R2
!   G0/3 -> ISP-R1
!
! Routing:
!   OSPF 200 - Internal AS200
!   BGP 200  - RR for ISP-R2 and ISP-R3
!   eBGP     - ISP-R1 and ISP-R5
!
! Secrets are sanitized for public repository.
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname ISP-R4

no ip domain lookup
ip domain name isp2.net
ip cef
no ipv6 cef
no cdp run

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>
username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! ------------------------------------------------------------
! Interfaces
! ------------------------------------------------------------
!

interface Loopback0
 description BGP-Router-ID
 ip address 200.4.4.4 255.255.255.255
 ip ospf network point-to-point

interface GigabitEthernet0/0
 description Link-to-ISP-R3-AS200
 ip address 200.0.0.9 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_R4_R3>
 no shutdown

interface GigabitEthernet0/1
 description Link-to-ISP-R5-AS100
 ip address 203.0.113.10 255.255.255.252
 no shutdown

interface GigabitEthernet0/2
 description Link-to-ISP-R2-AS200
 ip address 200.0.0.2 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_R4_R2>
 no shutdown

interface GigabitEthernet0/3
 description Link-to-ISP-R1-AS100
 ip address 203.0.113.6 255.255.255.252
 no shutdown

!
! ------------------------------------------------------------
! OSPF - Internal Routing for AS200
! ------------------------------------------------------------
!

router ospf 200
 router-id 200.4.4.4

 area 0 authentication message-digest

 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/2

 network 200.0.0.0 0.0.0.3 area 0
 network 200.0.0.8 0.0.0.3 area 0
 network 200.4.4.4 0.0.0.0 area 0

!
! ------------------------------------------------------------
! BGP - AS200 Route Reflector
! ------------------------------------------------------------
!

router bgp 200
 bgp router-id 200.4.4.4
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

!
! iBGP Peer - ISP-R2
!
 neighbor 200.2.2.2 remote-as 200
 neighbor 200.2.2.2 update-source Loopback0
 neighbor 200.2.2.2 password <BGP_KEY_R4_R2>

!
! iBGP Peer - ISP-R3
!
 neighbor 200.3.3.3 remote-as 200
 neighbor 200.3.3.3 update-source Loopback0
 neighbor 200.3.3.3 password <BGP_KEY_R4_R3>

!
! eBGP Peer - ISP-R1 / AS100
!
 neighbor 203.0.113.5 remote-as 100
 neighbor 203.0.113.5 password <BGP_KEY_R4_R1>
 neighbor 203.0.113.5 ttl-security hops 2
 neighbor 203.0.113.5 timers 10 30

!
! eBGP Peer - ISP-R5 / AS100
!
 neighbor 203.0.113.9 remote-as 100
 neighbor 203.0.113.9 password <BGP_KEY_R4_R5>
 neighbor 203.0.113.9 ttl-security hops 2
 neighbor 203.0.113.9 timers 10 30

!
! IPv4 Address Family
!
 address-family ipv4

  !
  ! Local Loopback Advertisement
  !
  network 200.4.4.4 mask 255.255.255.255

  !
  ! Route Reflector Clients
  !
  neighbor 200.2.2.2 activate
  neighbor 200.2.2.2 route-reflector-client
  neighbor 200.2.2.2 send-community both
  neighbor 200.2.2.2 next-hop-self

  neighbor 200.3.3.3 activate
  neighbor 200.3.3.3 route-reflector-client
  neighbor 200.3.3.3 send-community both
  neighbor 200.3.3.3 next-hop-self

  !
  ! eBGP to AS100
  !
  neighbor 203.0.113.5 activate
  neighbor 203.0.113.5 route-map TO-AS100 out

  neighbor 203.0.113.9 activate
  neighbor 203.0.113.9 route-map TO-AS100 out

 exit-address-family

!
! ------------------------------------------------------------
! BGP Policy
! ------------------------------------------------------------
!

ip prefix-list PUBLIC-ONLY seq 5 deny 10.0.0.0/8 le 32
ip prefix-list PUBLIC-ONLY seq 10 deny 172.16.0.0/12 le 32
ip prefix-list PUBLIC-ONLY seq 15 deny 192.168.0.0/16 le 32
ip prefix-list PUBLIC-ONLY seq 20 permit 0.0.0.0/0 ge 1

route-map TO-AS100 permit 10
 match ip address prefix-list PUBLIC-ONLY

!
! ------------------------------------------------------------
! Management Security
! ------------------------------------------------------------
!

no ip http server
no ip http secure-server

ip ssh version 2
ip ssh time-out 60

ip access-list standard MGMT-SSH
 remark Permit approved management sources only
 permit host 200.2.2.2
 permit host 200.3.3.3
 permit host 200.4.4.4
 permit 10.0.99.0 0.0.0.255
 deny any log

!
! ------------------------------------------------------------
! Control Plane
! ------------------------------------------------------------
!

control-plane

!
! ------------------------------------------------------------
! Access Lines
! ------------------------------------------------------------
!

line con 0
 logging synchronous
 login local

line aux 0
 no exec

line vty 0 