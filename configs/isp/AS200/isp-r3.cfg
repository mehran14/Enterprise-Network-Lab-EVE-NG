!
! ============================================================
! Device: ISP-R3
! Role: AS200 Edge Router (Peering with Branch)
! Site: ISP-2
! Platform: Cisco IOSv 15.6
!
! Topology:
!   G0/0 -> BR-EDGE1 (Customer Branch)
!   G0/1 -> ISP-R4 (Internal RR)
!   G0/2 -> ISP-R5 (AS100 Transit)
!   G0/3 -> ISP-R2 (Internal AS200)
!
! Routing:
!   OSPF 200 - Internal AS200 Routing
!   BGP 200  - Peering with AS65002 (Branch) and AS100
!
! Secrets are sanitized for public repository.
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname ISP-R3

no ip domain lookup
ip domain name isp2.net
ip cef
no ipv6 cef
no cdp run

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>
username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! ------------------------------------------------------------
! Interfaces
! ------------------------------------------------------------
!

interface Loopback0
 description BGP-Router-ID
 ip address 200.3.3.3 255.255.255.255
 ip ospf network point-to-point

interface GigabitEthernet0/0
 description Link-to-BR-EDGE1-AS65002
 ip address 198.51.100.9 255.255.255.252
 no shutdown

interface GigabitEthernet0/1
 description Link-to-ISP-R4-AS200
 ip address 200.0.0.10 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_R3_R4>
 no shutdown

interface GigabitEthernet0/2
 description Link-to-ISP-R5-AS100
 ip address 203.0.113.14 255.255.255.252
 no shutdown

interface GigabitEthernet0/3
 description Link-to-ISP-R2-AS200
 ip address 200.0.0.6 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_R3_R2>
 no shutdown

!
! ------------------------------------------------------------
! OSPF - Internal Routing
! ------------------------------------------------------------
!

router ospf 200
 router-id 200.3.3.3
 area 0 authentication message-digest
 passive-interface default
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/3
 network 200.0.0.4 0.0.0.3 area 0
 network 200.0.0.8 0.0.0.3 area 0
 network 200.3.3.3 0.0.0.0 area 0

!
! ------------------------------------------------------------
! BGP - Multi-AS Peering
! ------------------------------------------------------------
!

router bgp 200
 bgp router-id 200.3.3.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 ! --- External Peer: Branch ---
 neighbor 198.51.100.10 remote-as 65002
 neighbor 198.51.100.10 password <BGP_KEY_BRANCH>
 neighbor 198.51.100.10 ttl-security hops 2
 neighbor 198.51.100.10 timers 10 30

 ! --- Internal Peer: ISP-R2 ---
 neighbor 200.2.2.2 remote-as 200
 neighbor 200.2.2.2 password <BGP_KEY_R3_R2>
 neighbor 200.2.2.2 update-source Loopback0

 ! --- Internal Peer: ISP-R4 (RR) ---
 neighbor 200.4.4.4 remote-as 200
 neighbor 200.4.4.4 password <BGP_KEY_R3_R4>
 neighbor 200.4.4.4 update-source Loopback0

 ! --- External Peer: ISP-R5 (AS100) ---
 neighbor 203.0.113.13 remote-as 100
 neighbor 203.0.113.13 password <BGP_KEY_R3_R5>
 neighbor 203.0.113.13 timers 10 30

 !
 address-family ipv4
  network 198.51.100.8 mask 255.255.255.252
  network 200.3.3.3 mask 255.255.255.255

  ! --- Branch Policy ---
  neighbor 198.51.100.10 activate
  neighbor 198.51.100.10 default-originate
  neighbor 198.51.100.10 route-map FROM-BR in
  neighbor 198.51.100.10 route-map TO-BR out

  ! --- Internal Peers Policy ---
  neighbor 200.2.2.2 activate
  neighbor 200.2.2.2 send-community both
  neighbor 200.2.2.2 next-hop-self

  neighbor 200.4.4.4 activate
  neighbor 200.4.4.4 send-community both
  neighbor 200.4.4.4 next-hop-self

  ! --- Transit Policy ---
  neighbor 203.0.113.13 activate
  neighbor 203.0.113.13 route-map TO-EBGP out
 exit-address-family

!
! ------------------------------------------------------------
! BGP Policies & Prefix-Lists
! ------------------------------------------------------------
!

ip prefix-list BRANCH-IN seq 5 permit 10.1.0.0/16 le 32
ip prefix-list BRANCH-IN seq 10 permit 33.33.33.33/32
ip prefix-list BRANCH-IN seq 15 permit 198.51.100.8/30

ip prefix-list DEFAULT-ONLY seq 5 permit 0.0.0.0/0

ip prefix-list PUBLIC-ONLY seq 5 deny 10.0.0.0/8 le 32
ip prefix-list PUBLIC-ONLY seq 10 deny 172.16.0.0/12 le 32
ip prefix-list PUBLIC-ONLY seq 15 deny 192.168.0.0/16 le 32
ip prefix-list PUBLIC-ONLY seq 20 permit 0.0.0.0/0 ge 1

route-map FROM-BR permit 10
 match ip address prefix-list BRANCH-IN

route-map TO-BR permit 10
 match ip address prefix-list DEFAULT-ONLY

route-map TO-EBGP permit 10
 match ip address prefix-list PUBLIC-ONLY

!
! ------------------------------------------------------------
! Management & Security
! ------------------------------------------------------------
!

no ip http server
no ip http secure-server

ip ssh version 2
ip ssh time-out 60

ip access-list standard MGMT-SSH
 permit host 200.2.2.2
 permit host 200.3.3.3
 permit host 200.4.4.4
 permit 10.0.99.0 0.0.0.255
 deny any log

!
! ------------------------------------------------------------
! Access Lines
! ------------------------------------------------------------
!

line con 0
 logging synchronous
 login local

line aux 0
 no exec

line vty 0 4
 access-class MGMT-SSH in
 logging synchronous
 login local
 transport input ssh
 transport output none

end
