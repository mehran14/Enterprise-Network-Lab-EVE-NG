!
! ============================================================
! Device: ISP-R2
! Role: ISP2 Border Router / AS200 Edge
! IOS: 15.6
! Public/Sanitized Configuration
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname ISP-R2

!
! Basic Security
!
no ip domain lookup
ip domain name isp2.net
ip cef
no ipv6 cef

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>
username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

no cdp run

!
! Loopback / Router-ID
!
interface Loopback0
 description BGP-Router-ID
 ip address 200.2.2.2 255.255.255.255
 ip ospf network point-to-point

!
! Link to HQ-EDGE2
!
interface GigabitEthernet0/0
 description Link-to-HQ-EDGE2
 ip address 198.51.100.6 255.255.255.252
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R4
!
interface GigabitEthernet0/1
 description Link-to-ISP-R4
 ip address 200.0.0.1 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_AS200_R2_R4>
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R1 - AS100
!
interface GigabitEthernet0/2
 description Link-to-ISP-R1
 ip address 203.0.113.2 255.255.255.252
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R3
!
interface GigabitEthernet0/3
 description Link-to-ISP-R3
 ip address 200.0.0.5 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_AS200_R2_R3>
 duplex auto
 speed auto
 media-type rj45

!
! Internal OSPF for AS200
!
router ospf 200
 router-id 200.2.2.2
 area 0 authentication message-digest

 passive-interface default
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/3

 network 200.0.0.0 0.0.0.3 area 0
 network 200.0.0.4 0.0.0.3 area 0
 network 200.2.2.2 0.0.0.0 area 0

!
! BGP AS200
!
router bgp 200
 bgp router-id 200.2.2.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 !
 ! eBGP with HQ-EDGE2 - AS65001
 !
 neighbor 198.51.100.5 remote-as 65001
 neighbor 198.51.100.5 ttl-security hops 2
 neighbor 198.51.100.5 password <BGP_EBGP_HQ_PASSWORD>
 neighbor 198.51.100.5 timers 10 30

 !
 ! iBGP with ISP-R3
 !
 neighbor 200.3.3.3 remote-as 200
 neighbor 200.3.3.3 password <BGP_IBGP_R3_PASSWORD>
 neighbor 200.3.3.3 update-source Loopback0

 !
 ! iBGP with ISP-R4
 !
 neighbor 200.4.4.4 remote-as 200
 neighbor 200.4.4.4 password <BGP_IBGP_R4_PASSWORD>
 neighbor 200.4.4.4 update-source Loopback0

 !
 ! eBGP with ISP-R1 - AS100
 !
 neighbor 203.0.113.1 remote-as 100
 neighbor 203.0.113.1 password <BGP_EBGP_AS100_PASSWORD>
 neighbor 203.0.113.1 timers 10 30

 !
 address-family ipv4

  !
  ! Locally originated prefixes
  !
  network 198.51.100.4 mask 255.255.255.252
  network 200.2.2.2 mask 255.255.255.255

  !
  ! Enterprise HQ-EDGE2
  !
  neighbor 198.51.100.5 activate
  neighbor 198.51.100.5 default-originate
  neighbor 198.51.100.5 route-map FROM-HQ in
  neighbor 198.51.100.5 route-map TO-HQ out

  !
  ! iBGP with ISP-R3
  !
  neighbor 200.3.3.3 activate
  neighbor 200.3.3.3 send-community both
  neighbor 200.3.3.3 next-hop-self

  !
  ! iBGP with ISP-R4
  !
  neighbor 200.4.4.4 activate
  neighbor 200.4.4.4 send-community both
  neighbor 200.4.4.4 next-hop-self

  !
  ! eBGP with ISP-R1
  !
  neighbor 203.0.113.1 activate
  neighbor 203.0.113.1 route-map TO-EBGP out

 exit-address-family

!
! Management and SSH
!
no ip http server
no ip http secure-server
ip ssh time-out 60
ip ssh version 2

!
! Prefix Lists
!
ip prefix-list DEFAULT-ONLY seq 5 permit 0.0.0.0/0

ip prefix-list ENTERPRISE-IN seq 5 permit 10.0.0.0/16 le 32
ip prefix-list ENTERPRISE-IN seq 10 permit 22.22.22.22/32
ip prefix-list ENTERPRISE-IN seq 15 permit 198.51.100.4/30

ip prefix-list PUBLIC-ONLY seq 5 deny 10.0.0.0/8 le 32
ip prefix-list PUBLIC-ONLY seq 10 deny 172.16.0.0/12 le 32
ip prefix-list PUBLIC-ONLY seq 15 deny 192.168.0.0/16 le 32
ip prefix-list PUBLIC-ONLY seq 20 permit 0.0.0.0/0 ge 1

!
! BGP Policies
!
route-map FROM-HQ permit 10
 match ip address prefix-list ENTERPRISE-IN

route-map TO-EBGP permit 10
 match ip address prefix-list PUBLIC-ONLY

route-map TO-HQ permit 10
 match ip address prefix-list DEFAULT-ONLY

!
! SSH Management ACL
!
ip access-list standard MGMT-SSH
 permit host 200.2.2.2
 permit 10.0.99.0 0.0.0.255
 deny any log

!
! Control Plane
!
control-plane

!
! Lines
!
line con 0
 logging synchronous

line aux 0

line vty 0 4
 access-class MGMT-SSH in
 logging synchronous
 login local
 transport input ssh
 transport output none

!
no scheduler allocate

end
