!
! ============================================================
! Device: ISP-R5
! Role: ISP1 Internal/Core Router
! Autonomous System: 100
! IOS: 15.6
! Public/Sanitized Configuration
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname ISP-R5

!
! Basic Security
!
no ip domain lookup
ip domain name isp1.net
ip cef
no ipv6 cef

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>
username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! BGP/OSPF Router-ID
!
interface Loopback0
 description BGP-Router-ID
 ip address 100.5.5.5 255.255.255.255
 ip ospf network point-to-point

!
! Link to ISP-R4 - AS200
!
interface GigabitEthernet0/0
 description Link-to-ISP-R4
 ip address 203.0.113.9 255.255.255.252
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R1 - AS100
!
interface GigabitEthernet0/1
 description Link-to-ISP-R1
 ip address 100.0.0.2 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_AS100>
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R3 - AS200
!
interface GigabitEthernet0/2
 description Link-to-ISP-R3
 ip address 203.0.113.13 255.255.255.252
 duplex auto
 speed auto
 media-type rj45

!
! Unused Interface
!
interface GigabitEthernet0/3
 description UNUSED
 no ip address
 shutdown
 duplex auto
 speed auto
 media-type rj45

!
! Internal Routing داخل AS100
!
router ospf 100
 router-id 100.5.5.5
 area 0 authentication message-digest

 passive-interface default
 no passive-interface GigabitEthernet0/1

 network 100.0.0.0 0.0.0.3 area 0
 network 100.5.5.5 0.0.0.0 area 0

!
! BGP AS100
!
router bgp 100
 bgp router-id 100.5.5.5
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 !
 ! iBGP with ISP-R1
 !
 neighbor 100.1.1.1 remote-as 100
 neighbor 100.1.1.1 password <BGP_IBGP_PASSWORD>
 neighbor 100.1.1.1 update-source Loopback0

 !
 ! eBGP with ISP-R4 - AS200
 !
 neighbor 203.0.113.10 remote-as 200
 neighbor 203.0.113.10 password <BGP_EBGP_ISP_PASSWORD>
 neighbor 203.0.113.10 timers 10 30

 !
 ! eBGP with ISP-R3 - AS200
 !
 neighbor 203.0.113.14 remote-as 200
 neighbor 203.0.113.14 password <BGP_EBGP_ISP_PASSWORD>
 neighbor 203.0.113.14 timers 10 30

 !
 address-family ipv4

  !
  ! Local ISP-R5 Prefix
  !
  network 100.5.5.5 mask 255.255.255.255

  !
  ! iBGP with ISP-R1
  !
  neighbor 100.1.1.1 activate
  neighbor 100.1.1.1 send-community both
  neighbor 100.1.1.1 next-hop-self

  !
  ! eBGP with AS200
  !
  neighbor 203.0.113.10 activate
  neighbor 203.0.113.10 route-map INTERNET-OUT out

  neighbor 203.0.113.14 activate
  neighbor 203.0.113.14 route-map INTERNET-OUT out

 exit-address-family

!
! Management Services
!
no ip http server
no ip http secure-server
ip ssh time-out 60
ip ssh version 2

!
! BGP Outbound Filtering
!
ip prefix-list NON-RFC1918 seq 5 deny 10.0.0.0/8 le 32
ip prefix-list NON-RFC1918 seq 10 deny 172.16.0.0/12 le 32
ip prefix-list NON-RFC1918 seq 15 deny 192.168.0.0/16 le 32
ip prefix-list NON-RFC1918 seq 20 permit 0.0.0.0/0 ge 1

route-map INTERNET-OUT permit 10
 match ip address prefix-list NON-RFC1918

!
! SSH Management ACL
!
ip access-list standard MGMT-SSH
 permit 100.5.5.0 0.0.0.255
 deny any log

!
! Control Plane
!
control-plane

!
! Lines
!
line con 0
 logging synchronous

line aux 0

line vty 0 4
 access-class MGMT-SSH in
 logging synchronous
 login local
 transport input ssh
 transport output none

!
no scheduler allocate

end
