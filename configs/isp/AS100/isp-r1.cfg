!
! ============================================================
! Device: ISP-R1
! Role: ISP1 Border Router / AS100 Edge
! IOS: 15.6
! Public/Sanitized Configuration
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname ISP-R1

!
! Basic Security
!
no ip domain lookup
ip domain name isp1.net
ip cef
no ipv6 cef

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>
username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! Loopbacks
!
interface Loopback0
 description BGP-Router-ID
 ip address 100.1.1.1 255.255.255.255
 ip ospf network point-to-point

interface Loopback88
 description Simulated-Internet-GoogleDNS
 ip address 8.8.8.8 255.255.255.255

!
! Link to Enterprise HQ Edge
!
interface GigabitEthernet0/0
 description Link-to-HQ-EDGE1
 ip address 198.51.100.2 255.255.255.252
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R5 - AS100 Internal
!
interface GigabitEthernet0/1
 description Link-to-ISP-R5
 ip address 100.0.0.1 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_AS100>
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R4 - AS200
!
interface GigabitEthernet0/2
 description Link-to-ISP-R4
 ip address 203.0.113.5 255.255.255.252
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R2 - AS200
!
interface GigabitEthernet0/3
 description Link-to-ISP-R2
 ip address 203.0.113.1 255.255.255.252
 duplex auto
 speed auto
 media-type rj45

!
! OSPF for AS100 Internal Reachability
!
router ospf 100
 router-id 100.1.1.1
 area 0 authentication message-digest

 passive-interface default
 no passive-interface GigabitEthernet0/1

 network 100.0.0.0 0.0.0.3 area 0
 network 100.1.1.1 0.0.0.0 area 0

!
! BGP - AS100
!
router bgp 100
 bgp router-id 100.1.1.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 !
 ! iBGP with ISP-R5
 !
 neighbor 100.5.5.5 remote-as 100
 neighbor 100.5.5.5 password <BGP_IBGP_PASSWORD>
 neighbor 100.5.5.5 update-source Loopback0

 !
 ! eBGP with Enterprise HQ-EDGE1
 !
 neighbor 198.51.100.1 remote-as 65001
 neighbor 198.51.100.1 ttl-security hops 2
 neighbor 198.51.100.1 password <BGP_EBGP_ENTERPRISE_PASSWORD>
 neighbor 198.51.100.1 timers 10 30

 !
 ! eBGP with ISP-R2 - AS200
 !
 neighbor 203.0.113.2 remote-as 200
 neighbor 203.0.113.2 password <BGP_EBGP_ISP_PASSWORD>
 neighbor 203.0.113.2 timers 10 30

 !
 ! eBGP with ISP-R4 - AS200
 !
 neighbor 203.0.113.6 remote-as 200
 neighbor 203.0.113.6 password <BGP_EBGP_ISP_PASSWORD>
 neighbor 203.0.113.6 timers 10 30

 !
 address-family ipv4

  !
  ! Advertised Internet/ISP prefixes
  !
  network 8.8.8.8 mask 255.255.255.255
  network 100.1.1.1 mask 255.255.255.255
  network 198.51.100.0 mask 255.255.255.252

  !
  ! iBGP Peer - ISP-R5
  !
  neighbor 100.5.5.5 activate
  neighbor 100.5.5.5 send-community both
  neighbor 100.5.5.5 next-hop-self

  !
  ! Enterprise Customer - HQ-EDGE1
  !
  neighbor 198.51.100.1 activate
  neighbor 198.51.100.1 default-originate
  neighbor 198.51.100.1 route-map BLOCK-PRIVATE-IN in

  !
  ! Inter-ISP eBGP Peers
  !
  neighbor 203.0.113.2 activate
  neighbor 203.0.113.2 route-map INTERNET-OUT out

  neighbor 203.0.113.6 activate
  neighbor 203.0.113.6 route-map INTERNET-OUT out

 exit-address-family

!
! Management Services
!
no ip http server
no ip http secure-server
ip ssh time-out 60
ip ssh version 2

!
! Prefix Filtering
!
ip prefix-list HQ-PUBLIC-RANGES seq 5 permit 198.51.100.0/22 le 32

ip prefix-list RFC1918 seq 5 deny 10.0.0.0/8 le 32
ip prefix-list RFC1918 seq 10 deny 172.16.0.0/12 le 32
ip prefix-list RFC1918 seq 15 deny 192.168.0.0/16 le 32
ip prefix-list RFC1918 seq 20 permit 0.0.0.0/0 ge 1

!
! BGP Policy
!
route-map BLOCK-PRIVATE-IN permit 10
 match ip address prefix-list HQ-PUBLIC-RANGES

route-map INTERNET-OUT permit 10
 match ip address prefix-list RFC1918

!
! Restrict SSH Access
!
ip access-list standard MGMT-SSH
 permit 100.1.1.0 0.0.0.255
 deny any log

!
! Control Plane
!
control-plane

!
! Console and VTY
!
line con 0
 logging synchronous

line aux 0

line vty 0 4
 access-class MGMT-SSH in
 logging synchronous
 login local
 transport input ssh
 transport output none

!
no scheduler allocate

end
