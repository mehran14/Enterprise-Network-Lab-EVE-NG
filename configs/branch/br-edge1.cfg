!
! ============================================================
! Device: BR-EDGE1
! Role: Branch Edge Router
! IOS: 15.6
! Public/Sanitized Configuration
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname BR-EDGE1

!
! Basic Security
!
no ip domain lookup
ip domain name lab.local
ip cef
no ipv6 cef
no cdp run

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>
username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! AAA
!
aaa new-model
aaa authentication login default local
aaa authorization exec default local
aaa session-id common

!
! GRE over IPsec
!
crypto isakmp policy 10
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key <GRE_IPSEC_PSK> address 198.51.100.1

crypto ipsec transform-set TS-GRE-IPSEC esp-aes 256 esp-sha-hmac
 mode transport

crypto ipsec profile PROF-GRE-IPSEC
 set transform-set TS-GRE-IPSEC
 set pfs group14

!
! Loopback / Router-ID
!
interface Loopback0
 description BR-EDGE1 Router-ID
 ip address 33.33.33.33 255.255.255.255
 ip ospf network point-to-point

!
! GRE Tunnel to HQ-EDGE1
!
interface Tunnel100
 description GRE-over-IPsec-to-HQ-EDGE1
 ip address 172.16.100.2 255.255.255.252
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source GigabitEthernet0/2
 tunnel destination 198.51.100.1
 tunnel key 100
 tunnel protection ipsec profile PROF-GRE-IPSEC

!
! Link to BR-CORE2
!
interface GigabitEthernet0/0
 description Link-to-BR-CORE2
 ip address 10.200.1.10 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_CORE2>
 duplex auto
 speed auto
 media-type rj45

!
! Link to BR-CORE1
!
interface GigabitEthernet0/1
 description Link-to-BR-CORE1
 ip address 10.200.1.6 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_CORE1>
 duplex auto
 speed auto
 media-type rj45

!
! Internet-facing link to ISP-R3
!
interface GigabitEthernet0/2
 description Link-to-ISP-R3
 ip address 198.51.100.10 255.255.255.252
 ip nat outside
 ip virtual-reassembly in
 duplex auto
 speed auto
 media-type rj45

!
! Unused
!
interface GigabitEthernet0/3
 no ip address
 shutdown
 duplex auto
 speed auto
 media-type rj45

!
! OSPF
!
router ospf 1
 router-id 33.33.33.33
 auto-cost reference-bandwidth 100000
 area 0 authentication message-digest
 redistribute bgp 65002 subnets route-map RM-FROM-HQ
 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 network 10.200.1.4 0.0.0.3 area 0
 network 10.200.1.8 0.0.0.3 area 0
 network 33.33.33.33 0.0.0.0 area 0
 default-information originate

!
! BGP
!
router bgp 65002
 bgp router-id 33.33.33.33
 bgp log-neighbor-changes
 no bgp default ipv4-unicast

 neighbor 172.16.100.1 remote-as 65001
 neighbor 172.16.100.1 description BGP-to-HQ-over-Tunnel
 neighbor 172.16.100.1 password <IBGP_OVER_TUNNEL_PASSWORD>

 neighbor 198.51.100.9 remote-as 200
 neighbor 198.51.100.9 description eBGP-to-ISP-R3
 neighbor 198.51.100.9 ttl-security hops 2
 neighbor 198.51.100.9 password <ISP_BGP_PASSWORD>
 neighbor 198.51.100.9 timers 10 30

 address-family ipv4
  network 10.1.0.0 mask 255.255.0.0
  network 10.200.0.0 mask 255.255.0.0
  network 33.33.33.33 mask 255.255.255.255

  neighbor 172.16.100.1 activate
  neighbor 172.16.100.1 route-map RM-FROM-HQ in
  neighbor 172.16.100.1 route-map RM-TO-HQ out

  neighbor 198.51.100.9 activate
  neighbor 198.51.100.9 route-map FROM-ISP in
  neighbor 198.51.100.9 route-map TO-ISP out
 exit-address-family

!
! NAT and Routing
!
ip nat inside source route-map RM-NAT-BRANCH interface GigabitEthernet0/2 overload

ip route 0.0.0.0 0.0.0.0 198.51.100.9
ip route 10.1.0.0 255.255.0.0 Null0

!
! Management Services
!
no ip http server
no ip http secure-server
ip ssh time-out 60
ip ssh version 2

!
! SSH Management ACL
!
ip access-list standard MGMT-SSH
 permit 10.1.99.0 0.0.0.255
 permit 10.0.99.0 0.0.0.255
 deny any log

!
! NAT Exemption and Internet NAT
!
ip access-list extended NAT-ACL-BRANCH
 remark === Do not NAT Branch-to-HQ traffic ===
 deny   ip 10.1.0.0 0.0.255.255 10.0.0.0 0.0.255.255
 remark === Do not NAT Branch transit/router-source traffic to HQ ===
 deny   ip 10.200.0.0 0.0.255.255 10.0.0.0 0.0.255.255
 remark === NAT Branch LAN users to Internet ===
 permit ip 10.1.0.0 0.0.255.255 any
 remark === NAT Branch transit/router IPs to Internet if needed ===
 permit ip 10.200.0.0 0.0.255.255 any

!
! Prefix Lists
!
ip prefix-list ANY seq 5 permit 0.0.0.0/0 le 32
ip prefix-list DEFAULT seq 5 permit 0.0.0.0/0

ip prefix-list FROM-HQ seq 5 permit 10.0.0.0/16 le 32
ip prefix-list FROM-HQ seq 10 permit 11.11.11.11/32

ip prefix-list TO-HQ seq 5 permit 10.200.0.0/16 le 32
ip prefix-list TO-HQ seq 7 permit 10.1.0.0/16 le 32
ip prefix-list TO-HQ seq 10 permit 33.33.33.33/32

!
! Route Maps
!
route-map RM-FROM-HQ permit 10
 match ip address prefix-list FROM-HQ

route-map RM-TO-HQ permit 10
 match ip address prefix-list TO-HQ

route-map RM-NAT-BRANCH permit 10
 match ip address NAT-ACL-BRANCH

route-map FROM-ISP permit 10
 match ip address prefix-list DEFAULT

route-map TO-ISP deny 10
 match ip address prefix-list ANY

!
! Control Plane
!
control-plane

!
! Console and VTY
!
line con 0
 logging synchronous

line aux 0

line vty 0 4
 access-class MGMT-SSH in
 logging synchronous
 login authentication default
 transport input ssh
 transport output none

!
no scheduler allocate

end
