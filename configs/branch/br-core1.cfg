!
! ============================================================
! Device: BR-CORE1
! Role: Branch Core Router / Inter-VLAN Gateway
! IOS: 15.6
! Public/Sanitized Configuration
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname BR-CORE1

!
! Basic Security
!
no ip domain lookup
ip domain name lab.local
ip cef
no ipv6 cef
no cdp run

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>
username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! Track uplink to Branch Edge for HSRP
!
track 1 interface GigabitEthernet0/0 line-protocol

!
! Loopback / OSPF Router-ID
!
interface Loopback0
 description BR-CORE1 Router-ID
 ip address 1.1.1.1 255.255.255.255
 ip ospf network point-to-point

!
! Routed link to BR-EDGE1
!
interface GigabitEthernet0/0
 description Link-to-BR-EDGE1
 ip address 10.200.1.5 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_EDGE1>
 ip ospf cost 10
 duplex auto
 speed auto
 media-type rj45

!
! Routed link to BR-CORE2
!
interface GigabitEthernet0/1
 description Link-to-BR-CORE2
 ip address 10.200.1.1 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_CORE2>
 duplex auto
 speed auto
 media-type rj45

!
! 802.1Q Trunk to Branch Access Layer
!
interface GigabitEthernet0/2
 description Trunk-to-BR-ASW1
 no ip address
 duplex auto
 speed auto
 media-type rj45

!
! VLAN 10 - Branch Users
! BR-CORE1 is Active
!
interface GigabitEthernet0/2.10
 description VLAN10-Users
 encapsulation dot1Q 10
 ip address 10.1.10.2 255.255.255.0
 ip helper-address 10.0.20.10

 standby version 2
 standby 10 ip 10.1.10.1
 standby 10 priority 110
 standby 10 preempt delay minimum 30
 standby 10 authentication md5 key-string <HSRP_KEY_VLAN10>
 standby 10 track 1 decrement 30

 no cdp enable

!
! VLAN 20 - Branch Servers
! BR-CORE1 is Standby
!
interface GigabitEthernet0/2.20
 description VLAN20-Servers
 encapsulation dot1Q 20
 ip address 10.1.20.2 255.255.255.0

 standby version 2
 standby 20 ip 10.1.20.1
 standby 20 priority 90
 standby 20 preempt delay minimum 30
 standby 20 authentication md5 key-string <HSRP_KEY_VLAN20>
 standby 20 track 1 decrement 30

 no cdp enable

!
! VLAN 99 - Branch Management
! BR-CORE1 is Active
!
interface GigabitEthernet0/2.99
 description VLAN99-Management
 encapsulation dot1Q 99
 ip address 10.1.99.2 255.255.255.0

 standby version 2
 standby 99 ip 10.1.99.1
 standby 99 priority 110
 standby 99 preempt delay minimum 30
 standby 99 authentication md5 key-string <HSRP_KEY_VLAN99>
 standby 99 track 1 decrement 30

 no cdp enable

!
! Unused Native VLAN
!
interface GigabitEthernet0/2.999
 description Native-Blackhole-VLAN
 encapsulation dot1Q 999 native
 no cdp enable

!
! Unused Interface
!
interface GigabitEthernet0/3
 no ip address
 shutdown
 duplex auto
 speed auto
 media-type rj45

!
! OSPF
!
router ospf 1
 router-id 1.1.1.1
 auto-cost reference-bandwidth 100000
 area 0 authentication message-digest

 passive-interface default
 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1

 network 1.1.1.1 0.0.0.0 area 0
 network 10.1.10.0 0.0.0.255 area 0
 network 10.1.20.0 0.0.0.255 area 0
 network 10.1.99.0 0.0.0.255 area 0
 network 10.200.1.0 0.0.0.3 area 0
 network 10.200.1.4 0.0.0.3 area 0

!
! Management Services
!
no ip http server
no ip http secure-server
ip ssh time-out 60
ip ssh version 2

!
! Restrict SSH to Management Networks
!
ip access-list standard MGMT-SSH
 permit 10.1.99.0 0.0.0.255
 permit 10.0.99.0 0.0.0.255
 deny any log

!
! Control Plane
!
control-plane

!
! Console and VTY
!
line con 0
 logging synchronous

line aux 0

line vty 0 4
 access-class MGMT-SSH in
 logging synchronous
 login local
 transport input ssh
 transport output none

!
no scheduler allocate

end
