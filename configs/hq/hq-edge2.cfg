!
! ============================================================
! Device: HQ-EDGE2
! Role: HQ Enterprise Edge Router
! IOS: 15.6
! Public/Sanitized Configuration
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname HQ-EDGE2

!
! Basic Security
!
no ip domain lookup
ip domain name lab.local
ip cef
no ipv6 cef
no cdp run

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>

username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! Loopback
!
interface Loopback0
 description HQ-EDGE2 Router-ID and Management Source
 ip address 22.22.22.22 255.255.255.255
 ip ospf network point-to-point

!
! Link to HQ-EDGE1
!
interface GigabitEthernet0/0
 description Link-to-HQ-EDGE1-iBGP
 ip address 10.0.0.22 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_EDGE1>
 duplex auto
 speed auto
 media-type rj45

!
! Link to HQ-CORE2
!
interface GigabitEthernet0/1
 description Link-to-HQ-CORE2
 ip address 10.0.0.18 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_CORE2>
 duplex auto
 speed auto
 media-type rj45

!
! Link to HQ-CORE1
!
interface GigabitEthernet0/2
 description Link-to-HQ-CORE1
 ip address 10.0.0.14 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_CORE1>
 duplex auto
 speed auto
 media-type rj45

!
! Link to ISP-R2
!
interface GigabitEthernet0/3
 description Link-to-ISP-R2
 ip address 198.51.100.5 255.255.255.252
 ip nat outside
 ip virtual-reassembly in
 duplex auto
 speed auto
 media-type rj45

!
! OSPF - HQ Area 0
!
router ospf 1
 router-id 22.22.22.22
 auto-cost reference-bandwidth 100000
 area 0 authentication message-digest

 passive-interface default

 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2

 network 10.0.0.12 0.0.0.3 area 0
 network 10.0.0.16 0.0.0.3 area 0
 network 10.0.0.20 0.0.0.3 area 0
 network 22.22.22.22 0.0.0.0 area 0

 default-information originate always

!
! BGP
!
router bgp 65001
 bgp router-id 22.22.22.22
 bgp log-neighbor-changes

 !
 ! iBGP to HQ-EDGE1
 !
 neighbor 11.11.11.11 remote-as 65001
 neighbor 11.11.11.11 description iBGP-to-HQ-EDGE1
 neighbor 11.11.11.11 password <IBGP_PASSWORD>
 neighbor 11.11.11.11 update-source Loopback0
 neighbor 11.11.11.11 timers 30 90
 neighbor 11.11.11.11 fall-over

 !
 ! eBGP to ISP-R2
 !
 neighbor 198.51.100.6 remote-as 200
 neighbor 198.51.100.6 description eBGP-to-ISP-R2
 neighbor 198.51.100.6 password <ISP_BGP_PASSWORD>

 !
 address-family ipv4

  network 10.0.0.0 mask 255.255.0.0
  network 22.22.22.22 mask 255.255.255.255

  !
  ! iBGP
  !
  neighbor 11.11.11.11 activate
  neighbor 11.11.11.11 send-community both
  neighbor 11.11.11.11 next-hop-self

  !
  ! eBGP to ISP-R2
  !
  neighbor 198.51.100.6 activate
  neighbor 198.51.100.6 prefix-list DEFAULT in
  neighbor 198.51.100.6 prefix-list HQ-NETS out
  neighbor 198.51.100.6 route-map SET-LP-IN in
  neighbor 198.51.100.6 route-map PREPEND out

 exit-address-family

!
! NAT
!
ip nat inside source route-map RM-NAT-HQ-2 interface GigabitEthernet0/3 overload

!
! Static NAT - Web Server HTTP/HTTPS
!
ip nat inside source static tcp 10.0.10.50 80 198.51.100.5 80 extendable
ip nat inside source static tcp 10.0.10.50 443 198.51.100.5 443 extendable

!
! Default Route and BGP Origination Route
!
ip route 0.0.0.0 0.0.0.0 198.51.100.6
ip route 10.0.0.0 255.255.0.0 Null0

!
! SSH
!
ip ssh time-out 60
ip ssh version 2

no ip http server
no ip http secure-server

!
! NAT ACL
! HQ-to-Branch and HQ-to-Management traffic is not translated
!
ip access-list extended NAT-ACL-HQ-2
 deny   