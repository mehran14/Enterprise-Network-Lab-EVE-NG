!
! ============================================================
! Device: HQ-EDGE1
! Role: HQ Enterprise Edge Router
! IOS: 15.6
! Public/Sanitized Configuration
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname HQ-EDGE1

!
! Basic Security
!
no ip domain lookup
ip domain name lab.local
ip cef
no ipv6 cef
no cdp run

login block-for 120 attempts 3 within 60

enable secret <ENABLE_SECRET>

username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! AAA - TACACS+/RADIUS-style NPS fallback design
!
aaa new-model
aaa session-id common

aaa group server radius NPS-GROUP
 server name NPS-HQ
 ip radius source-interface Loopback0

aaa authentication login SSH-LOGIN group NPS-GROUP local
aaa authorization exec SSH-AUTHZ group NPS-GROUP local if-authenticated
aaa accounting exec SSH-ACCT start-stop group NPS-GROUP

!
! ISAKMP / IPsec
!
crypto isakmp policy 10
 encr aes 256
 authentication pre-share
 group 14

crypto isakmp key <IPSEC_PRESHARED_KEY> address 198.51.100.10

crypto ipsec transform-set TS-GRE-IPSEC esp-aes 256 esp-sha-hmac
 mode transport

crypto ipsec profile PROF-GRE-IPSEC
 set transform-set TS-GRE-IPSEC
 set pfs group14

!
! Loopback
!
interface Loopback0
 description HQ-EDGE1 Router-ID and Management Source
 ip address 11.11.11.11 255.255.255.255
 ip ospf network point-to-point

!
! GRE over IPsec Tunnel
!
interface Tunnel100
 description GRE over IPsec to BR-EDGE1
 ip address 172.16.100.1 255.255.255.252
 ip mtu 1400
 ip tcp adjust-mss 1360
 tunnel source GigabitEthernet0/3
 tunnel destination 198.51.100.10
 tunnel key 100
 tunnel protection ipsec profile PROF-GRE-IPSEC

!
! HQ-EDGE2 - iBGP / OSPF
!
interface GigabitEthernet0/0
 description Link-to-HQ-EDGE2-iBGP
 ip address 10.0.0.21 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_EDGE2>
 duplex auto
 speed auto
 media-type rj45

!
! HQ-CORE1 - OSPF
!
interface GigabitEthernet0/1
 description Link-to-HQ-CORE1
 ip address 10.0.0.6 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_CORE1>
 duplex auto
 speed auto
 media-type rj45

!
! HQ-CORE2 - OSPF
!
interface GigabitEthernet0/2
 description Link-to-HQ-CORE2
 ip address 10.0.0.10 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_CORE2>
 duplex auto
 speed auto
 media-type rj45

!
! ISP-R1 - eBGP / Outside NAT
!
interface GigabitEthernet0/3
 description Link-to-ISP-R1
 ip address 198.51.100.1 255.255.255.252
 ip nat outside
 ip virtual-reassembly in
 duplex auto
 speed auto
 media-type rj45

!
! OSPF - HQ Area 0
!
router ospf 1
 router-id 11.11.11.11
 auto-cost reference-bandwidth 100000
 area 0 authentication message-digest

 passive-interface default

 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2

 network 10.0.0.4 0.0.0.3 area 0
 network 10.0.0.8 0.0.0.3 area 0
 network 10.0.0.20 0.0.0.3 area 0
 network 11.11.11.11 0.0.0.0 area 0

 redistribute bgp 65001 subnets route-map RM-FROM-BRANCH

 default-information originate always

!
! BGP
!
router bgp 65001
 bgp router-id 11.11.11.11
 bgp log-neighbor-changes

 !
 ! iBGP to HQ-EDGE2
 !
 neighbor 22.22.22.22 remote-as 65001
 neighbor 22.22.22.22 description iBGP-to-HQ-EDGE2
 neighbor 22.22.22.22 password <IBGP_PASSWORD>
 neighbor 22.22.22.22 update-source Loopback0
 neighbor 22.22.22.22 timers 30 90
 neighbor 22.22.22.22 fall-over

 !
 ! eBGP over GRE Tunnel to Branch
 !
 neighbor 172.16.100.2 remote-as 65002
 neighbor 172.16.100.2 description eBGP-to-BR-EDGE1-over-GRE-IPsec
 neighbor 172.16.100.2 password <BRANCH_BGP_PASSWORD>

 !
 ! eBGP to ISP-R1
 !
 neighbor 198.51.100.2 remote-as 100
 neighbor 198.51.100.2 description eBGP-to-ISP-R1
 neighbor 198.51.100.2 password <ISP_BGP_PASSWORD>
 neighbor 198.51.100.2 ttl-security hops 2
 neighbor 198.51.100.2 timers 10 30

 !
 address-family ipv4

  network 10.0.0.0 mask 255.255.0.0
  network 11.11.11.11 mask 255.255.255.255

  !
  ! iBGP
  !
  neighbor 22.22.22.22 activate
  neighbor 22.22.22.22 send-community both
  neighbor 22.22.22.22 next-hop-self

  !
  ! Branch eBGP
  !
  neighbor 172.16.100.2 activate
  neighbor 172.16.100.2 route-map RM-FROM-BRANCH in

  !
  ! ISP eBGP
  !
  neighbor 198.51.100.2 activate
  neighbor 198.51.100.2 prefix-list DEFAULT in
  neighbor 198.51.100.2 prefix-list HQ-NETS out
  neighbor 198.51.100.2 route-map SET-LP-IN in
  neighbor 198.51.100.2 route-map PREPEND out

 exit-address-family

!
! NAT
!
ip nat inside source route-map RM-NAT-HQ interface GigabitEthernet0/3 overload

!
! Static NAT - Web Server HTTP/HTTPS
!
ip nat inside source static tcp 10.0.10.50 80 198.51.100.1 80 extendable
ip nat inside source static tcp 10.0.10.50 443 198.51.100.1 443 extendable

!
! BGP Origination / Tracking Null Route
!
ip route 10.0.0.0 255.255.0.0 Null0

!
! SSH
!
ip ssh time-out 60
ip ssh version 2

no ip http server
no ip http secure-server

!
! NAT ACL
! Do not NAT HQ-to-Branch or HQ-to-Management traffic
!
ip access-list extended NAT-ACL-HQ
 deny   ip 10.0.0.0 0.0.255.255 10.200.0.0 0.0.255.255
 deny   ip 10.0.0.0 0.0.255.255 10.1.0.0 0.0.255.255
 permit ip 10.0.0.0 0.0.255.255 any

!
! Prefix Lists
!
ip prefix-list DEFAULT seq 5 permit 0.0.0.0/0

ip prefix-list FROM-BRANCH seq 5 permit 10.1.0.0/16 le 32
ip prefix-list FROM-BRANCH seq 7 permit 10.200.0.0/16 le 32
ip prefix-list FROM-BRANCH seq 10 permit 33.33.33.33/32

ip prefix-list HQ-NETS seq 5 permit 10.0.0.0/16 le 32
ip prefix-list HQ-NETS seq 10 permit 11.11.11.11/32

!
! Route Maps
!
route-map RM-FROM-BRANCH permit 10
 match ip address prefix-list FROM-BRANCH

route-map PREPEND permit 10
 set as-path prepend 65001 65001 65001

route-map SET-LP-IN permit 10
 set local-preference 200

route-map RM-NAT-HQ permit 10
 match ip address NAT-ACL-HQ

!
! Management Access Control
!
access-list 10 permit 10.0.99.0 0.0.0.255

!
! NPS / RADIUS
!
radius server NPS-HQ
 address ipv4 10.0.20.10 auth-port 1812 acct-port 1813
 key <RADIUS_SHARED_SECRET>

!
! Control Plane
!
control-plane

!
! VTY - SSH Only
!
line con 0
 logging synchronous

line aux 0

line vty 0 4
 access-class 10 in
 authorization exec SSH-AUTHZ
 accounting exec SSH-ACCT
 logging synchronous
 login authentication SSH-LOGIN
 transport input ssh
 transport output none

!
no scheduler allocate

end
