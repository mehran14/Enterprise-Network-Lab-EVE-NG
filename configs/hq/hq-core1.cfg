!
! ============================================================
! Device: HQ-CORE1
! Role: HQ Core Router / Inter-VLAN Gateway
! IOS: 15.6
! Public/Sanitized Configuration
! ============================================================
!

version 15.6

service timestamps debug datetime msec
service timestamps log datetime msec
service password-encryption

hostname HQ-CORE1

!
! Basic Security
!
no ip domain lookup
ip domain name lab.local
ip cef
no ipv6 cef

enable secret <ENABLE_SECRET>
username admin privilege 15 secret <LOCAL_ADMIN_SECRET>

!
! Track Edge-facing links for HSRP
!
track 1 interface GigabitEthernet0/1 line-protocol
track 2 interface GigabitEthernet0/2 line-protocol

!
! Loopback / OSPF Router-ID
!
interface Loopback0
 description HQ-CORE1 Router-ID
 ip address 1.1.1.1 255.255.255.255
 ip ospf network point-to-point

!
! Routed link to HQ-CORE2
!
interface GigabitEthernet0/0
 description Link-to-HQ-CORE2
 ip address 10.0.0.1 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_CORE2>
 duplex auto
 speed auto
 media-type rj45

!
! Primary routed link to HQ-EDGE1
!
interface GigabitEthernet0/1
 description Link-to-HQ-EDGE1
 ip address 10.0.0.5 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_EDGE1>
 ip ospf cost 10
 duplex auto
 speed auto
 media-type rj45

!
! Secondary routed link to HQ-EDGE2
!
interface GigabitEthernet0/2
 description Link-to-HQ-EDGE2
 ip address 10.0.0.13 255.255.255.252
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 <OSPF_KEY_EDGE2>
 ip ospf cost 50
 duplex auto
 speed auto
 media-type rj45

!
! 802.1Q Trunk to HQ Access Layer
!
interface GigabitEthernet0/3
 description 802.1Q-Trunk-to-HQ-Access-Switch
 no ip address
 duplex full
 speed auto
 media-type rj45

!
! VLAN 10 - Users
! HQ-CORE1 is intended to be the active HSRP router
!
interface GigabitEthernet0/3.10
 description VLAN10-Users
 encapsulation dot1Q 10
 ip address 10.0.10.2 255.255.255.0
 ip helper-address 10.0.20.10

 standby version 2
 standby 10 ip 10.0.10.254
 standby 10 priority 120
 standby 10 preempt delay minimum 30
 standby 10 authentication md5 key-string <HSRP_KEY_VLAN10>
 standby 10 track 1 decrement 20
 standby 10 track 2 decrement 20

!
! VLAN 20 - Servers
! HQ-CORE2 is intended to be the active HSRP router
!
interface GigabitEthernet0/3.20
 description VLAN20-Servers
 encapsulation dot1Q 20
 ip address 10.0.20.2 255.255.255.0

 standby version 2
 standby 20 ip 10.0.20.254
 standby 20 priority 90
 standby 20 preempt delay minimum 30
 standby 20 authentication md5 key-string <HSRP_KEY_VLAN20>
 standby 20 track 1 decrement 20
 standby 20 track 2 decrement 20

!
! VLAN 99 - Management
! HQ-CORE1 is intended to be the active HSRP router
!
interface GigabitEthernet0/3.99
 description VLAN99-Management
 encapsulation dot1Q 99
 ip address 10.0.99.2 255.255.255.0

 standby version 2
 standby 99 ip 10.0.99.254
 standby 99 priority 120
 standby 99 preempt delay minimum 30
 standby 99 authentication md5 key-string <HSRP_KEY_VLAN99>
 standby 99 track 1 decrement 20
 standby 99 track 2 decrement 20

!
! Unused Native VLAN
!
interface GigabitEthernet0/3.999
 description Native-Blackhole-VLAN
 encapsulation dot1Q 999 native
 no ip address

!
! OSPF - HQ Area 0
!
router ospf 1
 router-id 1.1.1.1
 auto-cost reference-bandwidth 100000
 area 0 authentication message-digest

 passive-interface default

 no passive-interface GigabitEthernet0/0
 no passive-interface GigabitEthernet0/1
 no passive-interface GigabitEthernet0/2

 network 1.1.1.1 0.0.0.0 area 0
 network 10.0.0.0 0.0.0.3 area 0
 network 10.0.0.4 0.0.0.3 area 0
 network 10.0.0.12 0.0.0.3 area 0
 network 10.0.10.0 0.0.0.255 area 0
 network 10.0.20.0 0.0.0.255 area 0
 network 10.0.99.0 0.0.0.255 area 0

!
! Management Services
!
no ip http server
no ip http secure-server

ip ssh time-out 60
ip ssh version 2

!
! Restrict SSH to the management VLAN
!
ip access-list standard MGMT-SSH
 permit 10.0.99.0 0.0.0.255
 deny any log

!
! Control Plane
!
control-plane

!
! Console and VTY
!
line con 0
 logging synchronous

line aux 0

line vty 0 4
 access-class MGMT-SSH in
 logging synchronous
 login local
 transport input ssh
 transport output none

!
no scheduler allocate

end
